<!DOCTYPE html>
<html>
<head>
    <title>Attendance Records</title>

    <style>
        table{
            border-collapse: collapse;
            width: 100%;
        }

        th,td{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }

        th{
            background:#ddd;
        }

        button{
            padding:10px 20px;
            margin-bottom:15px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h2>Attendance Records</h2>

<button onclick="downloadExcel()">
    Download Excelsheet
</button>

<table id="attendanceTable">

    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Date</th>
            <th>Time In</th>
            <th>Time Out</th>
        </tr>
    </thead>

    <tbody>

    </tbody>

</table>

<script>

async function loadAttendance() {

    const response =
        await fetch("/attendance");

    const data = await response.json();

    const tbody =
        document.querySelector("#attendanceTable tbody");

    tbody.innerHTML = "";

    data.forEach(user => {

        tbody.innerHTML += `
        <tr>
            <td>${user.id}</td>
            <td>${user.name}</td>
            <td>${user.date}</td>
            <td>${user.time_in}</td>
            <td>${user.time_out || "NULL"}</td>
        </tr>
        `;
    });
}

// CSV Download
function downloadExcel() {
    window.location.href =
    "/export";
}

// har 2 second me refresh
setInterval(loadAttendance, 2000);

loadAttendance();

</script>

</body>
</html>
