<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
  
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    /* Reset and Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Card Container */
    .scanner-card {
      background: #ffffff;
      padding: 35px 25px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    h2 {
      color: #1e293b;
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 25px;
    }

    /* Scanner Camera Viewport Container */
    .scanner-wrapper {
      position: relative;
      background: #0f172a;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 25px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
    }

    /* Library target container overrides */
    #reader {
      width: 100% !important;
      border: none !important;
      background: transparent !important;
    }

    /* Custom overlay overlays inside library if needed, ensuring video scales well */
    #reader video {
      border-radius: 12px;
      object-fit: cover;
    }

    /* Action Button */
    .btn-start {
      width: 100%;
      background: #10b981;
      color: #ffffff;
      border: none;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-start:hover {
      background: #059669;
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
      transform: translateY(-1px);
    }

    .btn-start:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
    }

    /* Subtle animation scan line effect simulation placeholder */
    .placeholder-view {
      position: absolute;
      color: #94a3b8;
      font-size: 14px;
      z-index: 1;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .scanner-icon {
      width: 50px;
      height: 50px;
      border: 3px dashed #64748b;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="scanner-card">
    <h2>QR Scanner</h2>
    <p class="subtitle">Click below to grant camera access and scan your QR code.</p>

    <div class="scanner-wrapper">
      <div id="reader"></div>
    </div>

    <button class="btn-start" onclick="startScanner()">Start Scanner</button>
  </div>

  <script>
  let html5QrCode;

  function startScanner() {
      // Hide static placeholders if any style gets generated by library dynamically
      html5QrCode = new Html5Qrcode("reader");

      html5QrCode.start(
          { facingMode: "environment" },

          {
              fps: 10,
              qrbox: 250
          },

          async (decodedText) => {

              // QR mil gaya -> scanner stop
              await html5QrCode.stop();

              fetch("http://localhost:3000/qr/scan", {
                  method: "POST",
                  headers: {
                      "Content-Type": "application/json"
                  },
                  body: JSON.stringify({
                      qrData: decodedText
                  })
              })
              .then(res => res.json())
              .then(data => {

                  console.log(data);

                  alert(data.message);

              });

          },

          (error) => {
              // ignore scan errors
          }
      );
}
  </script>

</body>
</html>
